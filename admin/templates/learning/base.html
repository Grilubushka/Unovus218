<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RouteCraft{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #1e293b;
            --muted: #64748b;
            --line: #d7dee8;
            --surface: #ffffff;
            --band: #f5f7fb;
            --brand: #0f766e;
            --brand-dark: #115e59;
            --accent: #b45309;
            --danger: #b91c1c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--band);
            color: var(--ink);
            line-height: 1.5;
        }
        a { color: var(--brand-dark); }
        .shell { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--line);
        }
        .topbar-inner {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand {
            font-size: 18px;
            font-weight: 750;
            text-decoration: none;
            color: var(--ink);
        }
        .nav {
            display: flex;
            gap: 14px;
            align-items: center;
            font-size: 14px;
        }
        main { padding: 36px 0 56px; }
        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 24px;
        }
        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
            gap: 28px;
            align-items: start;
        }
        h1, h2, h3 { margin: 0 0 12px; line-height: 1.15; letter-spacing: 0; }
        h1 { font-size: clamp(30px, 5vw, 54px); max-width: 760px; }
        h2 { font-size: 24px; }
        h3 { font-size: 18px; }
        p { margin: 0 0 14px; }
        .muted { color: var(--muted); }
        .form-row { margin-bottom: 16px; }
        label { display: block; font-weight: 650; margin-bottom: 7px; }
        textarea, input, select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 11px 12px;
            font: inherit;
            color: var(--ink);
            background: #fff;
        }
        textarea:focus, input:focus, select:focus {
            outline: 3px solid rgba(15, 118, 110, .18);
            border-color: var(--brand);
        }
        .button-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        button, .button {
            border: 0;
            border-radius: 8px;
            background: var(--brand);
            color: #fff;
            padding: 11px 16px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
        }
        button:hover, .button:hover { background: var(--brand-dark); }
        .button.secondary { background: #334155; }
        .button.warning, button.warning { background: var(--accent); }
        .button.danger, button.danger { background: var(--danger); }
        .messages { display: grid; gap: 10px; margin-bottom: 18px; }
        .message {
            border-radius: 8px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            background: #fff;
        }
        .message.success { border-color: #86efac; background: #f0fdf4; }
        .message.error { border-color: #fecaca; background: #fef2f2; }
        .message.warning { border-color: #fde68a; background: #fffbeb; }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin: 18px 0;
        }
        .stat {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            background: #fff;
        }
        .stat strong { display: block; font-size: 22px; }
        .module-list { display: grid; gap: 18px; }
        .module {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 20px;
        }
        .module-head {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 16px;
            align-items: start;
        }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .tag {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 13px;
            color: #334155;
            background: #f8fafc;
        }
        .elements { display: grid; gap: 12px; margin-top: 16px; }
        .element {
            border-top: 1px solid var(--line);
            padding-top: 14px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(230px, 300px);
            gap: 18px;
        }
        .element-actions {
            display: grid;
            gap: 9px;
            align-content: start;
        }
        .mini-form { display: grid; gap: 8px; }
        .mini-form button { width: 100%; }
        .split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .empty {
            border: 1px dashed var(--line);
            border-radius: 8px;
            padding: 16px;
            color: var(--muted);
        }
        @media (max-width: 820px) {
            .hero, .module-head, .element, .split { grid-template-columns: 1fr; }
            .stats { grid-template-columns: 1fr; }
            .topbar-inner { height: auto; padding: 14px 0; align-items: flex-start; }
            .nav { flex-wrap: wrap; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="shell topbar-inner">
            <a class="brand" href="{% url 'learning:index' %}">RouteCraft</a>
            <nav class="nav">
                <a href="{% url 'learning:index' %}">Новый курс</a>
                <a href="/admin/">Админка</a>
            </nav>
        </div>
    </header>
    <main class="shell">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
